name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build .pkg.tar.zst and attach to release
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    outputs:
      pkgver: ${{ steps.meta.outputs.pkgver }}
      gittag: ${{ steps.meta.outputs.gittag }}
    steps:
      - name: Install toolchain
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel sudo git openssh nodejs python

      - name: Create build user
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers

      - uses: actions/checkout@v6

      - name: Derive version metadata
        id: meta
        run: |
          set -eux
          GITTAG="${GITHUB_REF_NAME}"            # e.g. v0.04.10-alpha
          VER="${GITTAG#v}"                      # 0.04.10-alpha
          PKGVER="${VER//-/.}"                   # 0.04.10.alpha  (pkgver forbids '-')
          echo "gittag=${GITTAG}" >> "${GITHUB_OUTPUT}"
          echo "pkgver=${PKGVER}" >> "${GITHUB_OUTPUT}"

      - name: Rewrite PKGBUILD for this tag
        run: |
          set -eux
          cd packaging/aur
          sed -i \
            -e "s|^pkgver=.*|pkgver=${{ steps.meta.outputs.pkgver }}|" \
            -e "s|^_gittag=.*|_gittag=${{ steps.meta.outputs.gittag }}|" \
            PKGBUILD

      - name: Fetch upstream tarball and record sha256
        run: |
          set -eux
          cd packaging/aur
          # Upstream is the source of truth for the AUR package. The tag
          # pushed to this fork must already exist on octra-labs/webcli.
          URL="https://github.com/octra-labs/webcli/archive/refs/tags/${{ steps.meta.outputs.gittag }}.tar.gz"
          curl -fsSL "${URL}" -o "source.tar.gz"
          SRC_SHA=$(sha256sum source.tar.gz | cut -d' ' -f1)
          SCRIPT_SHA=$(sha256sum octra-wallet.sh | cut -d' ' -f1)

          # Replace the SKIP lines with real sha256 sums.
          python3 - "$SRC_SHA" "$SCRIPT_SHA" <<'PY'
          import sys, pathlib
          src, script = sys.argv[1], sys.argv[2]
          p = pathlib.Path("PKGBUILD")
          p.write_text(
              p.read_text().replace(
                  "sha256sums=('SKIP'\n            'SKIP')",
                  f"sha256sums=('{src}'\n            '{script}')",
              )
          )
          PY

      - name: Build package
        run: |
          set -eux
          chown -R builder:builder packaging/aur
          cd packaging/aur
          sudo -u builder makepkg -s --noconfirm

      - name: Regenerate .SRCINFO
        run: |
          set -eux
          cd packaging/aur
          sudo -u builder makepkg --printsrcinfo > .SRCINFO

      - name: Upload artifacts for AUR job
        uses: actions/upload-artifact@v7
        with:
          name: aur-sources
          path: |
            packaging/aur/PKGBUILD
            packaging/aur/.SRCINFO
            packaging/aur/octra-wallet.sh

      - name: Upload built .pkg.tar.zst to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: packaging/aur/*.pkg.tar.zst

  publish-aur:
    name: Push PKGBUILD to AUR
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: aur-sources
          path: aur

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: octra-wallet
          pkgbuild: aur/PKGBUILD
          assets: |
            aur/octra-wallet.sh
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Release ${{ needs.build-and-release.outputs.gittag }}"
          ssh_keyscan_types: rsa,ed25519
